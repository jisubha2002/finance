version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nse-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=your-secret-key-here
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    restart: unless-stopped
    networks:
      - nse-network

  frontend:
    build: ./client
    container_name: nse-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    volumes:
      - ./client:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - nse-network
    command: npm run dev -- --host 0.0.0.0

networks:
  nse-network:
    driver: bridge

volumes:
  backend_data:
